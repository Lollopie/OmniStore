name: NestJS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_backend:
    runs-on: ubuntu-latest

    # Spin up a PostgreSQL service container
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        volumes:
          - ./backend/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
        # Wait until Postgres is healthy before starting the Node.js steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm' # Change to 'yarn' or 'pnpm' if applicable
          cache-dependency-path: backend
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run Unit Tests
        run: npm run test
        working-directory: backend
      # Optional: If you use an ORM like TypeORM or Prisma, run migrations here
      # - name: Run Database Migrations
      #   run: npm run migration:run
      #   env:
      #     DATABASE_URL: postgres://test_user:test_password@localhost:5432/nestjs_test

      - name: Run E2E Tests
        working-directory: backend
        run: npm run test:e2e
        env:
          # Inject variables so NestJS knows how to connect to the containerized DB
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: app_test_user
          DATABASE_PASSWORD: apppassword
          DATABASE_NAME: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}