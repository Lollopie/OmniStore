name: NestJS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_backend:
    runs-on: ubuntu-latest

    # Spin up a PostgreSQL service container
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        # Wait until Postgres is healthy before starting the Node.js steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm' # Change to 'yarn' or 'pnpm' if applicable
          cache-dependency-path: backend
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Initialize test database
        run: psql -v ON_ERROR_STOP=1 -h localhost -U test_user -d test -f backend/init-test-db.sql
        env:
          PGPASSWORD: test_password
      - name: Run Unit Tests
        run: npm run test
        working-directory: backend

      - name: Run E2E Tests
        working-directory: backend
        run: npm run test:e2e
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          APP_USER: app_test_user
          APP_PASSWORD: apppassword
          DATABASE_NAME: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
  cd-deploy:
    name: Deploy to Production
    needs: test_backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          echo "Triggering deployment on Render..."
          curl -s "${{secrets.RENDER_DEPLOY_HOOK_URL}}" > /dev/null
      - name: Wait for Deployment to Complete
        run: |
          echo "Waiting for deployment to complete..."
          sleep 60  # Adjust the sleep duration as needed
      - name: Post Deployment Health Check
        run: |
          APP_URL="https://omnistore-rxy6.onrender.com/healthz"
          MAX_RETRIES=5
          RETRY_INTERVAL=15
          
          echo "Commencing Health Check on $APP_URL"
          
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" "$APP_URL" || true)
            if [ "$STATUS" -eq 200 ]; then
              echo "Success! Application is live and healthy (HTTP 200)."
              exit 0
            else
              echo "Attempt $i failed (HTTP Status: $STATUS). Retrying in $RETRY_INTERVAL seconds..."
              sleep $RETRY_INTERVAL
            fi
          done
          
          echo "CRITICAL: Health check timed out or failed. Production may be broken!"
          exit 1
